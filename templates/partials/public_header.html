{# ── Shared Public Header / Navbar ──
   Set {% set active_page = 'home' %} or 'retention' before including. #}
<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/95 backdrop-blur-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
    <a href="{{ url_for('main.index') }}" class="flex items-center gap-3">
      <img src="{{ url_for('static', filename='img/grade-portal-logo.png') }}" alt="CICT Grade Portal" class="h-8 w-8 object-contain"/>
      <span class="text-sm font-bold tracking-tight text-slate-900 border-l border-slate-200 pl-3">CICT Grade Portal</span>
    </a>

    <nav class="flex flex-wrap items-center gap-2 text-sm font-medium">
      <a href="{{ url_for('main.index') }}"
         class="rounded-full px-4 py-1.5 transition {% if active_page == 'home' %}bg-slate-100 text-slate-900{% else %}text-slate-600 hover:bg-slate-50 hover:text-slate-900{% endif %}">
        Home
      </a>
      <a href="{{ url_for('main.retention_policies') }}"
         class="rounded-full px-4 py-1.5 transition {% if active_page == 'retention' %}bg-slate-100 text-slate-900{% else %}text-slate-600 hover:bg-slate-50 hover:text-slate-900{% endif %}">
        Retention Policies
      </a>
      {% if current_user.is_authenticated %}
      <a href="{{ url_for('main.index') }}" class="rounded-full border border-gold bg-gold px-4 py-1.5 text-sm font-bold text-black transition hover:bg-gold-dark">Open Portal</a>
      {% else %}
      <a href="{{ url_for('auth.login') }}" class="rounded-full border border-maroon bg-maroon px-4 py-1.5 text-white transition hover:bg-maroon-dark">Sign In</a>
      <a href="{{ url_for('auth.register') }}" class="hidden rounded-full border border-slate-200 px-4 py-1.5 text-slate-600 transition hover:bg-slate-50 hover:text-slate-900 sm:inline-flex">Register</a>
      {% endif %}
    </nav>
  </div>
</header>
