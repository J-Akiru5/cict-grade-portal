{# HTMX partial: Admin — Academic Settings #}
<div class="max-w-lg space-y-6">
  <h2 class="text-lg font-bold text-slate-800">Academic Settings</h2>

  <div class="paper-card p-6 space-y-5">
    <form method="POST" action="{{ url_for('panel.admin_settings') }}" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

      <div>
        <label for="semester" class="block text-sm font-medium text-slate-700 mb-1">Current Semester</label>
        <select id="semester" name="semester"
                class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-maroon/40">
          <option value="1st" {% if settings.current_semester == '1st' %}selected{% endif %}>1st Semester</option>
          <option value="2nd" {% if settings.current_semester == '2nd' %}selected{% endif %}>2nd Semester</option>
          <option value="Summer" {% if settings.current_semester == 'Summer' %}selected{% endif %}>Summer</option>
        </select>
      </div>

      <div>
        <label for="academic_year" class="block text-sm font-medium text-slate-700 mb-1">Academic Year</label>
        <select id="academic_year" name="academic_year"
                class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-maroon/40">
          {% for start in range(2020, 2032) %}
          {% set yr = start|string + '-' + (start + 1)|string %}
          <option value="{{ yr }}" {% if settings.current_year == yr %}selected{% endif %}>{{ yr }}</option>
          {% endfor %}
        </select>
        <p class="text-xs text-slate-400 mt-1">Select the current academic year.</p>
      </div>

      <button type="submit"
              class="w-full px-4 py-2 bg-maroon text-white text-sm font-semibold rounded-lg hover:bg-maroon/90 transition">
        Save Settings
      </button>
    </form>

    {% if settings.updated_at %}
    <div class="border-t border-slate-100 pt-4 text-xs text-slate-400 space-y-0.5">
      <p>Last updated: <span class="text-slate-500">{{ settings.updated_at.strftime('%B %d, %Y %H:%M') }}</span></p>
      {% if settings.updated_by %}
      <p>Updated by: <span class="text-slate-500">{{ settings.updated_by.email }}</span></p>
      {% endif %}
    </div>
    {% endif %}
  </div>
</div>
