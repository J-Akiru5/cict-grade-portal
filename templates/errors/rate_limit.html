{# Rate limit error template for HTMX requests #}
<div class="paper-card p-6 text-center bg-yellow-50 border-yellow-200">
  <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
    <svg class="w-8 h-8 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.732-.833-2.5 0L4.232 15.5c-.77.833.192 2.5 1.732 2.5z"/>
    </svg>
  </div>

  <h3 class="text-lg font-bold text-yellow-800 mb-2">Rate Limit Exceeded</h3>
  <p class="text-yellow-700 mb-4">
    You've made too many requests. Please wait a moment before trying again.
  </p>

  {% if error.retry_after %}
  <p class="text-sm text-yellow-600 mb-4">
    Please wait <span class="font-mono font-semibold">{{ error.retry_after }}s</span> before trying again.
  </p>
  {% endif %}

  <button onclick="window.location.reload()"
          class="px-4 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition font-medium">
    Refresh Page
  </button>
</div>
