{% extends "base.html" %}
{% block title %}403 — Access Denied{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center
            bg-[radial-gradient(circle_at_top_right,_#5B0000_0%,_#1e1e2e_45%,_#0f0f0f_100%)]">
  <div class="text-center px-6">
    <div class="font-mono font-bold text-[#EAB308] text-8xl mb-4">403</div>
    <h1 class="text-white font-bold text-2xl mb-2">Access Denied</h1>
    <p class="text-white/60 text-sm mb-6">You don't have permission to access this area.</p>
    <a href="{{ url_for('main.index') }}"
       class="inline-flex items-center gap-2 bg-[#5B0000] text-white font-semibold
              px-6 py-3 rounded-lg hover:shadow-[4px_4px_0px_0px_rgba(234,179,8,1)]
              transition-all duration-200">
      ← Go Home
    </a>
  </div>
</div>
{% endblock %}
