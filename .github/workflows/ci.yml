name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black isort mypy

    - name: Set up test environment
      run: |
        cp .env.example .env
        echo "FLASK_ENV=testing" >> .env
        echo "TESTING=true" >> .env
        echo "SQLALCHEMY_DATABASE_URI=sqlite:///test.db" >> .env

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all other issues as warnings
        flake8 app tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        black --check app tests

    - name: Check import sorting with isort
      run: |
        isort --check-only app tests

    - name: Type checking with mypy
      run: |
        mypy app --ignore-missing-imports

    - name: Run tests with pytest
      env:
        FLASK_ENV: testing
        TESTING: true
        WTF_CSRF_ENABLED: false
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety bandit

    - name: Security check with safety
      run: |
        safety check --json

    - name: Security check with bandit
      run: |
        bandit -r app -f json

  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build application
      run: |
        # Run any build steps here
        python -c "print('Build successful')"

    - name: Generate deployment artifact
      run: |
        tar -czf grade-portal-${{ github.sha }}.tar.gz app templates static requirements.txt

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: grade-portal-build
        path: grade-portal-${{ github.sha }}.tar.gz
        retention-days: 30